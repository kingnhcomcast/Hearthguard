plugins {
    id 'multiloader-loader'
    id 'fabric-loom'
}
configurations {
    commonClientJava {
        canBeResolved = true
    }
    commonClientResources {
        canBeResolved = true
    }
}

repositories {
    maven { url "https://maven.shedaniel.me/" }
}

dependencies {
    minecraft "com.mojang:minecraft:${minecraft_version}"
    mappings loom.layered {
        officialMojangMappings()
        parchment("org.parchmentmc.data:parchment-${parchment_minecraft}:${parchment_version}@zip")
    }
    modImplementation "net.fabricmc:fabric-loader:${fabric_loader_version}"
    modImplementation "net.fabricmc.fabric-api:fabric-api:${fabric_version}"

    modImplementation "curse.maven:modmenu-308702:5810603"
    modApi("me.shedaniel.cloth:cloth-config-fabric:15.0.130") {
        exclude(group: "net.fabricmc.fabric-api")
    }

    modRuntimeOnly "net.fabricmc.fabric-api:fabric-api:${fabric_version}"

    commonClientJava project(path: ':common', configuration: 'commonClientJava')
    commonClientResources project(path: ':common', configuration: 'commonClientResources')
}


loom {
    splitEnvironmentSourceSets()

    mods {
        "hearthguard" { // Your mod ID
            sourceSet sourceSets.main
            sourceSet sourceSets.client
        }
    }

    def aw = project(':common').file("src/main/resources/${mod_id}.accesswidener")
    if (aw.exists()) {
        accessWidenerPath.set(aw)
    }
    mixin {
        defaultRefmapName.set("${mod_id}.refmap.json")
    }
    runs {
        client {
            client()
            setConfigName('Fabric Client')
            ideConfigGenerated(true)
            runDir('runs/client')
            property "log4j.configurationFile", "classpath:log4j2.xml"
            property "fabric.development", "true"
        }
        server {
            server()
            setConfigName('Fabric Server')
            ideConfigGenerated(true)
            runDir('runs/server')
            property "log4j.configurationFile", "classpath:log4j2.xml"
        }
    }
}

tasks.named('compileClientJava', JavaCompile) {
    dependsOn(configurations.commonClientJava)
    source(configurations.commonClientJava)
}

tasks.named('processClientResources') {
    dependsOn(configurations.commonClientResources)
    from(configurations.commonClientResources)
}

// Implement mcgradleconventions loader attribute
def loaderAttribute = Attribute.of('io.github.mcgradleconventions.loader', String)
['apiElements', 'runtimeElements', 'sourcesElements', 'javadocElements', 'includeInternal', 'modCompileClasspath'].each { variant ->
    configurations.named("$variant") {
        attributes {
            attribute(loaderAttribute, 'fabric')
        }
    }
}

sourceSets.configureEach {
    [it.compileClasspathConfigurationName, it.runtimeClasspathConfigurationName].each { variant->
        configurations.named("$variant") {
            attributes {
                attribute(loaderAttribute, 'fabric')
            }
        }
    }
}
loom.remapConfigurations.configureEach {
    configurations.named(it.name) {
        attributes {
            attribute(loaderAttribute, 'fabric')
        }
    }
}
